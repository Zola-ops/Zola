<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zola's Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0d0d;
  color: #e0e0e0;
  font-family: 'PingFang SC', 'Microsoft YaHei', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.site-title {
  font-size: 1.8rem;
  font-weight: bold;
  color: #fff;
  letter-spacing: 4px;
  margin-bottom: 8px;
  text-align: center;
}
.site-sub {
  font-size: 0.8rem;
  color: #444;
  letter-spacing: 2px;
  margin-bottom: 48px;
  text-align: center;
}
.game-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 480px;
}
.game-card {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 20px 24px;
  text-decoration: none;
  color: inherit;
  display: flex;
  align-items: center;
  gap: 18px;
  transition: all 0.2s;
}
.game-card:hover {
  border-color: #f0c040;
  background: rgba(240,192,64,0.04);
  transform: translateY(-2px);
}
.game-icon { font-size: 2.2rem; width: 48px; text-align: center; flex-shrink: 0; }
.game-info { flex: 1; }
.game-name { font-size: 1rem; font-weight: bold; color: #fff; margin-bottom: 4px; }
.game-desc { font-size: 0.75rem; color: #666; line-height: 1.5; }
.game-arrow { font-size: 1rem; color: #333; }
.game-card:hover .game-arrow { color: #f0c040; }
</style>
</head>
<body>
  <div class="site-title">🎮 Zola's Games</div>
  <div class="site-sub">小游戏合集</div>
  <div class="game-list">
    <a class="game-card" href="./games/pm-simulator/">
      <div class="game-icon">🖥️</div>
      <div class="game-info">
        <div class="game-name">打工模拟器 · 互联网人版</div>
        <div class="game-desc">选择职业，应对职场突发事件，坚持工作满一年。你能撑多久？</div>
      </div>
      <div class="game-arrow">→</div>
    </a>
  </div>
</body>
</html>
